name: LeetHub Batch PR Splitter
on:
  push:
    branches:
      - leetcode-sync

# cancel-in-progress ensures that only the final commit in LeetHub's rapid burst runs this script
concurrency: 
  group: leethub-automation
  cancel-in-progress: true 

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  split-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for LeetHub burst to finish
        run: sleep 10
        
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Process Commits into Two Separate PRs
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Get all new commits pushed by LeetHub (oldest to newest)
          COMMITS=$(git log origin/main..origin/leetcode-sync --pretty="%H" --reverse)
          if [ -z "$COMMITS" ]; then exit 0; fi
          
          HAS_MAINT=0
          HAS_CODE=0
          CODE_MSG="LeetCode Solution"
          
          # ==========================================
          # BATCH 1: README & STATS (Maintenance)
          # ==========================================
          git checkout -b sync-maint origin/main
          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --pretty="%s" $COMMIT)
            if [[ "$MSG" == *"Updated stats"* || "$MSG" == *"Update README"* || "$MSG" == *"Create README"* ]]; then
              git cherry-pick -X theirs $COMMIT || git cherry-pick --skip || true
              HAS_MAINT=1
            fi
          done
          
          if [ $HAS_MAINT -eq 1 ]; then
            git push -f origin sync-maint
            # Create Issue 1
            ISSUE_URL=$(gh issue create --title "Sync: LeetHub README and Stats" --body "Automated tracking for topic tags and repository stats.")
            ISSUE_NUM=$(echo $ISSUE_URL | awk -F'/' '{print $NF}')
            
            # Create PR 1 & Merge
            gh pr create --base main --head sync-maint --title "Sync: README and Stats Updates" --body "Resolves #$ISSUE_NUM"
            gh pr merge sync-maint --merge
            gh issue close $ISSUE_NUM --comment "Merged maintenance updates."
          fi
          
          # ==========================================
          # BATCH 2: C++ CODE (Time / Space metrics)
          # ==========================================
          git fetch origin main
          git checkout -b sync-code origin/main
          
          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --pretty="%s" $COMMIT)
            if [[ "$MSG" != *"Updated stats"* && "$MSG" != *"Update README"* && "$MSG" != *"Create README"* ]]; then
              git cherry-pick -X theirs $COMMIT || git cherry-pick --skip || true
              HAS_CODE=1
              CODE_MSG=$MSG # Captures the exact string: "Time: 0 ms (100%), Space: X MB..."
            fi
          done
          
          if [ $HAS_CODE -eq 1 ]; then
            git push -f origin sync-code
            # Create Issue 2
            ISSUE_URL=$(gh issue create --title "Solve: $CODE_MSG" --body "Automated tracking for actual LeetCode code submission.")
            ISSUE_NUM=$(echo $ISSUE_URL | awk -F'/' '{print $NF}')
            
            # Create PR 2 & Merge
            gh pr create --base main --head sync-code --title "Solution: $CODE_MSG" --body "Resolves #$ISSUE_NUM"
            gh pr merge sync-code --merge
            gh issue close $ISSUE_NUM --comment "Merged LeetCode solution."
          fi
          
          # ==========================================
          # CLEANUP: Reset staging branch for the next problem
          # ==========================================
          git fetch origin main
          git checkout leetcode-sync
          git reset --hard origin/main
          git push -f origin leetcode-sync
